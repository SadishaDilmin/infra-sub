name: Security

# Security gate for a payments + personal-data app. Runs on every PR, on pushes
# to the deployment branches, and weekly (to catch newly-disclosed advisories).
#
# Job coverage:
#   - secret-scan (gitleaks)  : block committed credentials   [works on any repo]
#   - sast (semgrep)          : static analysis of the code   [works on any repo]
#   - audit (npm audit)       : known-vulnerable dependencies [report-only]
#   - codeql                  : GitHub-native SAST            [public repos / GHAS]
#   - dependency-review       : block vulnerable new deps     [public repos / GHAS, PRs]

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so gitleaks can scan all commits
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE is only required when the repo is owned by a GitHub
          # *organization*. Personal/public repos run for free.

  sast:
    name: SAST (semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Run semgrep
        # Public registry rule packs — no account/token required. Fails the job
        # on a finding; tune with a .semgrepignore or by adjusting the packs.
        run: >-
          semgrep scan
          --config p/security-audit
          --config p/secrets
          --config p/typescript
          --config p/javascript
          --error

  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Audit (high+)
        run: npm audit --audit-level=high
        # Report-only: dependency-review is the hard PR gate. Flip to remove
        # continue-on-error once the dependency tree is clean.
        continue-on-error: true

  codeql:
    name: CodeQL
    # CodeQL upload needs code scanning, i.e. a public repo or GitHub Advanced
    # Security. Skipped automatically on private repos so CI stays green.
    if: github.event.repository.visibility == 'public'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended
      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request' && github.event.repository.visibility == 'public'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
